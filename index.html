<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lvl.18 | Davide</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --mc-green: #55ff55; --mc-gold: #ffff55; --mc-purple: #c649ff;
            --mc-red: #ae1818; --mc-blue: #55ffff; --mc-border: #000000;
        }
        * { box-sizing: border-box; image-rendering: pixelated; }
        body, html {
            margin: 0; padding: 0; background-color: var(--mc-red);
            background-image: linear-gradient(90deg, rgba(0,0,0,0.1) 1px, transparent 1px), linear-gradient(rgba(0,0,0,0.1) 1px, transparent 1px);
            background-size: 4px 4px; color: #fff; font-family: 'Press Start 2P', cursive; overflow-x: hidden;
        }
        .container { display: flex; flex-direction: column; align-items: center; padding: 40px 15px 140px 15px; min-height: 100vh; }
        .lvl-display { font-size: 1.8rem; text-shadow: 3px 3px 0 #000; animation: glow 2s infinite; margin-bottom: 30px; }
        @keyframes glow { 0%, 100% { filter: drop-shadow(0 0 2px var(--mc-purple)); } 50% { filter: drop-shadow(0 0 10px var(--mc-purple)); } }

        /* --- 修正后的蛋糕组件 --- */
        .cake-wrapper { position: relative; width: 100px; margin: 20px 0; display: flex; flex-direction: column; align-items: center; }
        .candle-row { display: flex; justify-content: space-around; width: 60px; margin-bottom: -4px; z-index: 10; }
        .candle { position: relative; width: 10px; height: 25px; background: #e74c3c; border: 3px solid #000; }
        .candle::after { content: attr(data-v); position: absolute; top: 2px; width: 100%; text-align: center; font-size: 8px; }
        .flame { position: absolute; top: -14px; left: -1px; width: 6px; height: 8px; background: #ffff55; border: 2px solid #000; animation: burn 0.2s infinite alternate; }
        @keyframes burn { from { transform: scale(1); } to { transform: scale(1.2); } }
        .cake-main { width: 100px; height: 45px; background: #f1c40f; border: 4px solid #000; position: relative; }
        .cake-cream { position: absolute; top: -12px; left: -4px; width: 100px; height: 12px; background: #fff; border: 4px solid #000; border-bottom: none; }

        /* --- 进阶面板 --- */
        .achievement { background: #2a2a2a; border: 4px solid #000; padding: 15px; width: 95%; max-width: 360px; display: flex; margin: 20px 0; border-style: ridge; box-shadow: 0 0 0 4px #2a2a2a, 0 0 0 8px #888; }
        .ach-icon { width: 40px; height: 40px; border: 4px solid #fff; margin-right: 15px; flex-shrink: 0; box-shadow: 0 0 10px rgba(255,255,255,0.3); }

        /* --- 控制台：严格按照你的截图颜色和文字 --- */
        .cmd-panel { background: #1a0f0f; border-left: 6px solid var(--mc-gold); padding: 20px; width: 95%; max-width: 360px; font-size: 0.55rem; line-height: 2.2; margin-top: 10px; }
        .c-gray { color: #888; }
        .c-blue { color: var(--mc-blue); }
        .c-red { color: #ff5555; }
        .c-green { color: var(--mc-green); }
        .c-purple { color: #ff55ff; }

        /* --- 任务栏：恢复经典比例 --- */
        .hotbar-wrap { position: fixed; bottom: 30px; width: 340px; background: #8b8b8b; border: 4px solid #1e1e1e; padding: 2px; display: flex; left: 50%; transform: translateX(-50%); z-index: 100; }
        .hotbar-slot { flex: 1; background: #3c3c3c; border: 4px solid #1e1e1e; color: #fff; text-decoration: none; display: flex; align-items: center; justify-content: center; height: 56px; padding: 0 10px; }
        .hotbar-text { font-size: 0.5rem; text-align: center; text-shadow: 2px 2px 0 #000; line-height: 1.2; }
    </style>
</head>
<body>
    <div class="container">
        <div style="font-size:0.75rem; color:var(--mc-green); margin-bottom:10px;">&lt;Player: Davide&gt;</div>
        <div style="width:80%; max-width:260px; height:12px; background:#1a1a1a; border:3px solid #000; margin-bottom:15px;"><div style="width:100%; height:100%; background:linear-gradient(to right, #7cfc00, #32cd32);"></div></div>
        
        <div class="lvl-display">Lvl.18</div>

        <div class="cake-wrapper">
            <div class="candle-row">
                <div class="candle" data-v="1"><div class="flame"></div></div>
                <div class="candle" data-v="8"><div class="flame"></div></div>
            </div>
            <div class="cake-main"><div class="cake-cream"></div></div>
        </div>

        <div class="achievement">
            <div class="ach-icon"></div>
            <div>
                <div style="color:var(--mc-gold); font-size:0.6rem;">进阶: 地球 Online</div>
                <div style="font-size:0.5rem; margin-top:8px; line-height:1.4;">玩家已解锁: [ 成人阶段 ]<br>主线任务同步中...</div>
            </div>
        </div>

        <!-- 这里严格匹配你的截图 -->
        <div class="cmd-panel">
            <div><span class="c-gray">>> /connect</span> <span class="c-blue">EARTH_ONLINE_SERVER</span></div>
            <div><span class="c-gray">>> /gamemode</span> <span class="c-red">survival</span></div>
            <div><span class="c-gray">> /mission</span> <span class="c-green">庆祝 Player:Davide 抵达 Lvl.18</span></div>
            <div><span class="c-gray">> /locate</span> <span class="c-blue">V. Emerico Amari, 53, Palermo</span></div>
            <div><span class="c-gray">> /time</span> <span class="c-purple">2026.04.11 | 20:30</span></div>
            <div><span class="c-gray">> /give</span> <span class="c-green">@all</span> <span class="c-gray">birthday_cake 1</span></div>
        </div>
    </div>

    <div class="hotbar-wrap">
        <a href="https://maps.app.goo.gl/no5TBBPP844mTQhY6?g_st=ic" target="_blank" class="hotbar-slot">
            <span class="hotbar-text">[ 前往任务坐标 (GPS) ]</span>
        </a>
    </div>
</body>
</html>
