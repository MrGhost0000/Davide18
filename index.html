<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lvl.18 Achieved | Earth Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --mc-green: #55ff55; --mc-gold: #ffff55; --mc-purple: #c649ff;
            --mc-red: #ae1818; --mc-blue: #55ffff; --mc-border: #000000;
            --cake-base: #f1c40f; --cake-frosting: #fff; --cake-top: #e74c3c;
        }
        * { box-sizing: border-box; image-rendering: pixelated; }
        body, html {
            margin: 0; padding: 0; background-color: var(--mc-red);
            background-image: linear-gradient(90deg, rgba(0,0,0,0.1) 1px, transparent 1px), linear-gradient(rgba(0,0,0,0.1) 1px, transparent 1px);
            background-size: 4px 4px; color: #fff; font-family: 'Press Start 2P', cursive; overflow-x: hidden;
        }
        .container { display: flex; flex-direction: column; align-items: center; padding: 40px 15px 140px 15px; min-height: 100vh; }
        .player-tag { font-size: 0.75rem; margin-bottom: 8px; text-shadow: 2px 2px 0 #000; }
        .exp-bar { width: 85%; max-width: 280px; height: 10px; background: #1a1a1a; border: 2px solid #000; margin-bottom: 12px; }
        .exp-progress { width: 100%; height: 100%; background: #7cfc00; }
        .lvl-display { font-size: 1.8rem; text-shadow: 3px 3px 0 #000; animation: glow 2s infinite; margin-bottom: 40px; }
        @keyframes glow { 0%, 100% { filter: drop-shadow(0 0 2px var(--mc-purple)); } 50% { filter: drop-shadow(0 0 10px var(--mc-purple)); } }

        /* --- 暴力修正版蛋糕：所有东西都相对于蛋糕底部 --- */
        .cake-box {
            position: relative; width: 100px; height: 100px; margin: 20px 0;
        }
        /* 蛋糕主体 */
        .cake-main {
            position: absolute; bottom: 0; width: 100px; height: 40px;
            background: var(--cake-base); border: 4px solid #000; z-index: 2;
        }
        /* 奶油层 */
        .cake-cream {
            position: absolute; top: -12px; left: -4px; width: 100px; height: 12px;
            background: #fff; border: 4px solid #000; border-bottom: none;
        }
        /* 蜡烛：这次直接定位在奶油上方 1px */
        .candle-group {
            position: absolute; bottom: 38px; left: 0; width: 100px;
            display: flex; justify-content: space-around; z-index: 1;
        }
        .mc-candle {
            position: relative; width: 10px; height: 25px; 
            background: #e74c3c; border: 3px solid #000;
        }
        .mc-candle::after {
            content: attr(data-val); position: absolute; top: 2px; width: 100%;
            text-align: center; font-size: 8px; color: #fff;
        }
        /* 火焰：就在蜡烛头顶 */
        .mc-flame {
            position: absolute; top: -14px; left: -1px; width: 6px; height: 8px;
            background: var(--mc-gold); border: 2px solid #000;
            animation: burn 0.2s infinite alternate;
        }
        @keyframes burn { from { transform: scale(1); } to { transform: scale(1.2); background: #ffa500; } }

        .achievement { background: #2a2a2a; border: 4px solid #000; padding: 15px; width: 95%; max-width: 360px; display: flex; margin: 20px 0; }
        .icon { width: 40px; height: 40px; background: #444; border: 2px solid #fff; margin-right: 15px; }
        .cmd { background: rgba(0,0,0,0.8); border-left: 4px solid var(--mc-gold); padding: 15px; width: 95%; max-width: 360px; font-size: 0.55rem; line-height: 1.8; }
        .hotbar { position: fixed; bottom: 20px; width: 90%; max-width: 380px; background: #8b8b8b; border: 4px solid #000; display: flex; left: 50%; transform: translateX(-50%); }
        .slot { flex: 1; background: #3c3c3c; color: #fff; text-decoration: none; text-align: center; padding: 15px; font-size: 0.7rem; border: 2px solid #000; }
    </style>
</head>
<body>
    <div class="container">
        <div class="player-tag">&lt;Player: Davide&gt;</div>
        <div class="exp-bar"><div class="exp-progress"></div></div>
        <div class="lvl-display">Lvl.18</div>

        <div class="cake-box">
            <div class="candle-group">
                <div class="mc-candle" data-val="1"><div class="mc-flame"></div></div>
                <div class="mc-candle" data-val="8"><div class="mc-flame"></div></div>
            </div>
            <div class="cake-main">
                <div class="cake-cream"></div>
            </div>
        </div>

        <div class="achievement">
            <div class="icon"></div>
            <div>
                <div style="color:var(--mc-gold); font-size:0.6rem;">进阶: 地球 Online</div>
                <div style="font-size:0.5rem; margin-top:5px;">玩家已解锁: [ 成人阶段 ]</div>
            </div>
        </div>

        <div class="cmd">
            <div>>> /connect <span style="color:var(--mc-blue)">EARTH_SERVER</span></div>
            <div>>> /gamemode survival</div>
            <div>> /locate <span style="color:var(--mc-blue)">V. Emerico Amari, 53</span></div>
            <div>> /time 2026.04.11 | 20:30</div>
            <div>> /give @all birthday_cake 1</div>
        </div>
    </div>
    <div class="hotbar">
        <a href="https://maps.app.goo.gl/no5TBBPP844mTQhY6?g_st=ic" class="slot">[ 点击开启导航 GPS ]</a>
    </div>
</body>
</html>
