<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Davide's 18th Wanted Poster</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --wd-paper: #f4e4bc; --wd-ink: #3e2716; --mc-red: #ae1818; 
            --mc-gold: #ffaa00; --mc-border: #000000;
        }
        * { box-sizing: border-box; image-rendering: pixelated; }
        body, html {
            margin: 0; padding: 0; background-color: #1a1a1a;
            background-image: radial-gradient(#333 1px, transparent 1px);
            background-size: 15px 15px; font-family: 'Press Start 2P', cursive;
        }
        .container { display: flex; flex-direction: column; align-items: center; padding: 30px 15px 120px 15px; min-height: 100vh; }

        /* 📜 西部通缉令背景 */
        .poster {
            background: var(--wd-paper); border: 8px solid var(--mc-border);
            width: 100%; max-width: 380px; padding: 30px 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); position: relative;
            border-style: ridge; text-align: center; color: var(--wd-ink);
        }

        /* [ WANTED ] 标题 */
        .poster-title {
            font-size: 1.8rem; color: var(--mc-red); text-shadow: 3px 3px 0 var(--mc-border);
            margin-bottom: 20px; letter-spacing: 2px;
        }

        /* 通缉令中间的装饰线 */
        .divider { border-top: 4px dashed var(--wd-ink); width: 80%; margin: 15px auto; }

        /* 邀请内容 */
        .invitation-text { font-size: 0.65rem; line-height: 1.8; margin: 20px 0; }
        .highlight { color: var(--mc-red); font-weight: bold; }

        /* 蛋糕作为“诱饵” */
        .cake-display {
            width: 100px; height: 100px; background: #fff; border: 4px solid var(--mc-border);
            margin: 15px auto; display: flex; align-items: center; justify-content: center;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.1);
        }
        .mc-cake { width: 70px; height: 35px; background: #f1c40f; border: 3px solid #000; position: relative; }
        .mc-cake::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 10px; background: #fff; border-bottom: 3px solid #000; }

        /* 赏金/奖励 */
        .reward-section { margin-top: 20px; }
        .reward-amount { font-size: 1.2rem; color: var(--mc-gold); text-shadow: 2px 2px 0 var(--mc-border); }

        /* 任务指令面板 */
        .mission-panel {
            background: #222; border-left: 6px solid var(--mc-gold); color: #fff;
            padding: 15px; width: 100%; margin-top: 25px; text-align: left;
            font-size: 0.5rem; line-height: 2;
        }
        .c-blue { color: #55ffff; } .c-green { color: #55ff55; }

        /* 底部操作栏 */
        .hotbar {
            position: fixed; bottom: 30px; width: 340px; left: 50%; transform: translateX(-50%);
            background: #8b8b8b; border: 4px solid #1e1e1e; padding: 2px; display: flex; z-index: 100;
        }
        .hotbar-btn {
            flex: 1; height: 50px; background: #3c3c3c; border: 4px solid #1e1e1e;
            color: #fff; text-decoration: none; display: flex; align-items: center; justify-content: center;
            font-size: 0.55rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="poster">
            <div class="poster-title">WANTED</div>
            <div style="font-size: 0.5rem;">[ 紧急召集令 ]</div>
            
            <div class="divider"></div>

            <div class="invitation-text">
                亲爱的伙伴们：<br>
                你们被“邀请”参加 <br>
                <span class="highlight">Davide 的 Lvl.18 成人礼</span><br>
                这不仅是一场派对，<br>
                是一次重要的任务集结！
            </div>

            <div class="cake-display">
                <div class="mc-cake"></div>
            </div>

            <div class="reward-section">
                <div style="font-size: 0.5rem; margin-bottom: 5px;">成功逮捕 Davide 后可获得:</div>
                <div class="reward-amount">REWARD: 无限畅饮</div>
                <div style="font-size: 0.45rem; margin-top: 5px;">& 绝佳的生日蛋糕</div>
            </div>

            <div class="mission-panel">
                <div>> /locate <span class="c-blue">Rodeo Drive Restaurant</span></div>
                <div>> /address <span class="c-blue">Via Atenasio, 8, Palermo</span></div>
                <div>> /time <span style="color:#ff55ff;">2026.04.11 | 20:30</span></div>
                <div>> /status <span class="c-green">Waiting for you...</span></div>
            </div>

            <div style="font-size: 0.4rem; color: #8b6b4c; margin-top: 20px;">RSVP: wx_3317847554</div>
        </div>
    </div>

    <div class="hotbar">
        <a href="https://maps.google.com/?q=Via+Atenasio+8+Palermo" target="_blank" class="hotbar-btn">
            [ 确认任务坐标 (GPS) ]
        </a>
    </div>
</body>
</html>
