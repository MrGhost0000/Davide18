<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lvl.18 | Earth Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --mc-green: #55ff55; --mc-gold: #ffff55; --mc-purple: #c649ff;
            --mc-red: #ae1818; --mc-blue: #55ffff; --mc-border: #000000;
        }
        * { box-sizing: border-box; image-rendering: pixelated; -webkit-font-smoothing: none; }
        body, html {
            margin: 0; padding: 0; background-color: var(--mc-red);
            background-image: linear-gradient(90deg, rgba(0,0,0,0.1) 1px, transparent 1px), linear-gradient(rgba(0,0,0,0.1) 1px, transparent 1px);
            background-size: 4px 4px; color: #fff; font-family: 'Press Start 2P', cursive; overflow-x: hidden;
        }
        .container { display: flex; flex-direction: column; align-items: center; padding: 40px 15px 140px 15px; min-height: 100vh; }
        .lvl-display { font-size: 1.8rem; text-shadow: 3px 3px 0 #000; animation: glow 2s infinite; margin-bottom: 30px; }
        @keyframes glow { 0%, 100% { filter: drop-shadow(0 0 2px var(--mc-purple)); } 50% { filter: drop-shadow(0 0 10px var(--mc-purple)); } }

        /* --- 刚才修复成功的蛋糕组件 --- */
        .cake-wrapper { position: relative; width: 100px; margin: 20px 0; display: flex; flex-direction: column; align-items: center; }
        .candle-row { display: flex; justify-content: space-around; width: 60px; margin-bottom: -4px; z-index: 10; }
        .candle { position: relative; width: 10px; height: 25px; background: #e74c3c; border: 3px solid #000; }
        .candle::after { content: attr(data-v); position: absolute; top: 2px; width: 100%; text-align: center; font-size: 8px; }
        .flame { position: absolute; top: -14px; left: -1px; width: 6px; height: 8px; background: #ffff55; border: 2px solid #000; animation: burn 0.2s infinite alternate; }
        @keyframes burn { from { transform: scale(1); } to { transform: scale(1.2); } }
        .cake-main { width: 100px; height: 45px; background: #f1c40f; border: 4px solid #000; position: relative; }
        .cake-cream { position: absolute; top: -12px; left: -4px; width: 100px; height: 12px; background: #fff; border: 4px solid #000; border-bottom: none; }

        /* --- 任务面板 --- */
        .achievement { background: #2a2a2a; border: 4px solid #000; padding: 15px; width: 95%; max-width: 360px; display: flex; margin: 20px 0; border-style: ridge; }
        .cmd-panel { background: rgba(0,0,0,0.85); border-left: 5px solid var(--mc-gold); padding: 18px; width: 95%; max-width: 360px; font-size: 0.55rem; line-height: 1.8; }

        /* --- 恢复原样的任务栏 (Hotbar) --- */
        .hotbar-wrap { position: fixed; bottom: 20px; width: 90%; max-width: 380px; background: #8b8b8b; border: 4px solid #1e1e1e; padding: 4px; display: flex; left: 50%; transform: translateX(-50%); z-index: 100; }
        .hotbar-slot { flex: 1; background: #3c3c3c; border: 3px solid #000; color: #fff; text-decoration: none; text-align: center; padding: 18px 5px; font-size: 0.75rem; text-shadow: 2px 2px 0 #000; }
    </style>
</head>
<body>
    <div class="container">
        <div style="font-size:0.75rem; color:var(--mc-green); margin-bottom:8px;">&lt;Player: Davide&gt;</div>
        <div style="width:85%; max-width:280px; height:10px; background:#1a1a1a; border:2px solid #000; margin-bottom:12px;"><div style="width:100%; height:100%; background:#7cfc00;"></div></div>
        <div class="lvl-display">Lvl.18</div>

        <div class="cake-wrapper">
            <div class="candle-row">
                <div class="candle" data-v="1"><div class="flame"></div></div>
                <div class="candle" data-v="8"><div class="flame"></div></div>
            </div>
            <div class="cake-main"><div class="cake-cream"></div></div>
        </div>

        <div class="achievement">
            <div style="width:40px; height:40px; background:#222; border:2px solid #fff; margin-right:15px; flex-shrink:0;"></div>
            <div>
                <div style="color:var(--mc-gold); font-size:0.6rem;">进阶: 地球 Online</div>
                <div style="font-size:0.5rem; margin-top:5px;">玩家已解锁: [ 成人阶段 ]</div>
            </div>
        </div>

        <div class="cmd-panel">
            <div>>> /connect <span style="color:var(--mc-blue)">EARTH_SERVER</span></div>
            <div>>> /gamemode <span style="color:#ff5555">survival</span></div>
            <div>> /locate <span style="color:var(--mc-blue)">V. Emerico Amari, 53</span></div>
            <div>> /time 2026.04.11 | 20:30</div>
            <div>> /give @all birthday_cake 1</div>
        </div>
    </div>

    <!-- 任务栏回来了 -->
    <div class="hotbar-wrap">
        <a href="https://maps.app.goo.gl/no5TBBPP844mTQhY6?g_st=ic" target="_blank" class="hotbar-slot">[ 前往任务坐标 (GPS) ]</a>
    </div>
</body>
</html>
