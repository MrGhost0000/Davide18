<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Level 18 Achieved | Earth Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --mc-green: #55ff55;
            --mc-gold: #ffff55;
            --mc-purple: #c649ff;
            --mc-red: #ae1818;
            --mc-blue: #55ffff;
            --mc-border: #000000;
        }

        /* 强制像素化渲染，拒绝模糊 */
        * { 
            box-sizing: border-box; 
            image-rendering: pixelated; 
            -webkit-font-smoothing: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--mc-red);
            /* 红色羊毛：深度打磨版纹理 */
            background-image: 
                linear-gradient(90deg, rgba(0,0,0,0.1) 1px, transparent 1px),
                linear-gradient(rgba(0,0,0,0.1) 1px, transparent 1px);
            background-size: 4px 4px;
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            overflow-x: hidden;
        }

        .container {
            display: flex; flex-direction: column; align-items: center;
            padding: 40px 15px 120px 15px; /* 底部预留Hotbar空间 */
            min-height: 100vh;
        }

        /* --- 玩家身份 (Player: Davide) --- */
        .player-tag {
            font-size: 0.75rem; 
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-shadow: 2px 2px 0 var(--mc-border);
        }
        .player-tag span { color: var(--mc-green); }

        /* --- 经验条 --- */
        .exp-bar {
            width: 85%; max-width: 280px; height: 10px;
            background: #1a1a1a; border: 2px solid var(--mc-border);
            margin-bottom: 12px; position: relative;
        }
        .exp-progress {
            width: 100%; height: 100%;
            background: linear-gradient(to bottom, #7cfc00, #32cd32);
            box-shadow: inset 0 2px 0 rgba(255,255,255,0.3);
        }

        /* --- Lvl18: 附魔流光特效 --- */
        .lvl-display {
            font-size: 1.8rem;
            position: relative;
            color: #fff;
            text-shadow: 3px 3px 0 var(--mc-border);
            animation: enchantment-pulse 2.5s infinite ease-in-out;
        }

        @keyframes enchantment-pulse {
            0%, 100% { filter: drop-shadow(0 0 2px var(--mc-purple)); color: #fff; }
            50% { filter: drop-shadow(0 0 12px var(--mc-purple)); color: var(--mc-gold); }
        }

        /* --- 像素火锅 (沸腾动效升级) --- */
        .hotpot-voxel {
            position: relative; width: 100px; height: 90px; margin: 35px 0;
        }
        .pot-base {
            position: absolute; bottom: 0; left: 10px;
            width: 80px; height: 45px; background: #bdbdbd;
            border: 4px solid var(--mc-border);
            box-shadow: inset -6px -6px 0 #7a7a7a;
        }
        .pot-soup {
            position: absolute; top: 0; left: 0; width: 100%; height: 14px;
            background: #e60000; border-bottom: 4px solid #800;
            animation: bubble 0.6s infinite alternate;
        }
        @keyframes bubble { from { height: 14px; } to { height: 17px; } }
        
        .steam { position: absolute; width: 6px; height: 6px; background: rgba(255,255,255,0.4); animation: steam-rise 2s infinite linear; opacity: 0; }
        .s1 { left: 25px; animation-delay: 0s; }
        .s2 { left: 50px; animation-delay: 0.6s; }
        .s3 { left: 75px; animation-delay: 1.2s; }
        @keyframes steam-rise {
            0% { transform: translateY(0); opacity: 0; }
            40% { opacity: 0.7; }
            100% { transform: translateY(-45px) translateX(5px); opacity: 0; }
        }

        /* --- 地球Online成就框 --- */
        .achievement-toast {
            background: #2a2a2a; border: 4px solid var(--mc-border);
            padding: 15px; width: 95%; max-width: 360px;
            display: flex; align-items: center; margin: 20px 0;
            border-style: ridge; /* 增加MC面板质感 */
        }
        .earth-icon {
            width: 42px; height: 42px;
            background: #222 url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAAAV0lEQVRYR+2XMQ4AIQwDaf//mS5MDKS05S5w7ZIIAhIURZfE6pYA9u455+S7Z455f845+X5/zhkX4P6fc8YFuP/nnHEB7v85Z1yA+3/OGRfghvI9Ab5fM6m7Fv5RAAAAAElFTkSuQmCC') center/cover;
            border: 3px solid #fff; flex-shrink: 0; margin-right: 15px;
            filter: drop-shadow(0 0 5px var(--mc-blue));
        }
        .toast-title { color: var(--mc-gold); font-size: 0.6rem; margin: 0; text-transform: uppercase; }
        .toast-desc { color: #fff; font-size: 0.55rem; margin: 6px 0 0 0; line-height: 1.4; }

        /* --- 任务控制台 (指令流) --- */
        .cmd-panel {
            background: rgba(0,0,0,0.85);
            border-left: 5px solid var(--mc-gold);
            padding: 20px; width: 95%; max-width: 360px;
            font-size: 0.6rem; line-height: 2;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .cmd-line { color: #888; margin-bottom: 6px; }
        .hl-green { color: var(--mc-green); }
        .hl-blue { color: var(--mc-blue); }
        .hl-pink { color: var(--mc-purple); }

        /* --- 底部Hotbar物品栏 --- */
        .hotbar-wrap {
            position: fixed; bottom: 20px; width: 92%; max-width: 380px;
            background: #8b8b8b; border: 4px solid #1e1e1e;
            padding: 4px; display: flex; z-index: 100;
        }
        .hotbar-slot {
            flex: 1; background: #3c3c3c; border: 3px solid var(--mc-border);
            box-shadow: inset -4px -4px 0 #1e1e1e, inset 4px 4px 0 #5a5a5a;
            color: #fff; text-decoration: none; text-align: center;
            padding: 18px 5px; font-size: 0.8rem;
            text-shadow: 2px 2px 0 var(--mc-border);
        }
        .hotbar-slot:active { 
            box-shadow: inset 4px 4px 0 #1e1e1e; 
            transform: translateY(2px);
            background: #2a2a2a;
        }

        .footer-text { font-size: 0.5rem; color: #777; margin-top: 25px; }

    </style>
</head>
<body>

    <div class="container">
        <div class="player-tag">&lt;<span>Player: Davide</span>&gt;</div>
        
        <div class="exp-bar">
            <div class="exp-progress"></div>
        </div>
        
        <div class="lvl-display">Lvl18</div>

        <div class="hotpot-voxel">
            <div class="steam s1"></div>
            <div class="steam s2"></div>
            <div class="steam s3"></div>
            <div class="pot-base"><div class="pot-soup"></div></div>
        </div>

        <div class="achievement-toast">
            <div class="earth-icon"></div>
            <div class="advancement-text">
                <h2 class="toast-title">进阶: 地球 Online</h2>
                <p class="toast-desc">玩家已解锁: [ 成人阶段 ]<br>主线任务同步中...</p>
            </div>
        </div>

        <div class="cmd-panel">
            <div class="cmd-line">>> /connect <span class="hl-blue">EARTH_ONLINE_SERVER</span></div>
            <div class="cmd-line">>> /gamemode <span style="color:#ff5555;">survival</span></div>
            <div class="cmd-line">> /mission <span class="hl-green">庆祝 Player:Davide 抵达 18 级</span></div>
            <div class="cmd-line">> /locate <span class="hl-blue">V. Emerico Amari, 53, Palermo</span></div>
            <div class="cmd-line">> /time <span class="hl-pink">2026.04.11 | 20:30 (入场)</span></div>
            <div class="cmd-line">> /give <span class="hl-green">@all</span> hotpot_buff 64</div>
        </div>

        <p class="footer-text">RSVP WeChat: wx_3317847554</p>
    </div>

    <div class="hotbar-wrap">
        <a href="weixin://dl/chat?wx_3317847554" class="hotbar-slot">[ 接受任务 ]</a>
    </div>

</body>
</html>
